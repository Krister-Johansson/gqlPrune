# Thin caller for the shared CI workflow — the actual jobs live in
# Krister-Johansson/shared-configs. Dependabot keeps the pinned version fresh.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: Krister-Johansson/shared-configs/.github/workflows/ci.yml@aee270c33b8c3d957f818a22b8f3fa1f6b987e9d # v1.1.3
    with:
      run-lint: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
