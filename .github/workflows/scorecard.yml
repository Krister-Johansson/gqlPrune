# Thin caller for the shared OpenSSF Scorecard workflow — the actual jobs live
# in Krister-Johansson/shared-configs; Dependabot keeps the pinned version
# fresh. The triggers must live here (cron cannot be defined in a reusable
# workflow).
name: Scorecard supply-chain security

on:
  # Re-run when branch-protection rules change (a Scorecard signal).
  branch_protection_rule:
  # Weekly, so the published score and README badge stay current.
  schedule:
    - cron: "27 7 * * 1"
  push:
    branches: [main]
  # Allow re-scanning on demand (Actions tab → Run workflow).
  workflow_dispatch:

# Least-privilege by default; the reusable workflow's job elevates what it needs.
# Do NOT add top-level env/defaults/write permissions — the Scorecard publish API
# rejects workflows that have them.
permissions:
  contents: read

jobs:
  scorecard:
    uses: Krister-Johansson/shared-configs/.github/workflows/scorecard.yml@aee270c33b8c3d957f818a22b8f3fa1f6b987e9d # v1.1.3
    permissions:
      contents: read # job permissions replace read-all; the scan needs repo reads
      security-events: write # SARIF upload to code scanning
      id-token: write # publish results to the OpenSSF API (badge)
    secrets:
      SCORECARD_TOKEN: ${{ secrets.SCORECARD_TOKEN }}
